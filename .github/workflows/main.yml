name: Build Cakru Dodge Stable
on:
  push:
    branches: [ "stable-version", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Build Rust Core
        run: |
          cd rust_logic
          # Gunakan --release agar performa AI kencang
          cargo build --target aarch64-linux-android --release
          mkdir -p ../jni
          cp target/aarch64-linux-android/release/libcakru_core.a ../jni/

      - name: Build Native Code (NDK)
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
          $NDK_PATH/ndk-build NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk

      - name: Generate R.java and Compile Java
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar

          mkdir -p res/drawable
          if [ ! -f res/drawable/ic_launcher.xml ]; then
            echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#FF0000"/><size android:width="48dp" android:height="48dp"/></shape>' > res/drawable/ic_launcher.xml
          fi

          mkdir -p gen
          $BUILD_TOOLS_PATH/aapt package -f -m -J gen -S res -M AndroidManifest.xml -I $PLATFORM_JAR

          mkdir -p obj/java
          find src gen -name "*.java" > java_files.txt
          javac -d obj/java -cp $PLATFORM_JAR @java_files.txt

          $BUILD_TOOLS_PATH/d8 --release --lib $PLATFORM_JAR --output . $(find obj/java -name "*.class")

      - name: Package APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          PLATFORM_JAR=$ANDROID_SDK_ROOT/platforms/android-34/android.jar

          $BUILD_TOOLS_PATH/aapt package -f -M AndroidManifest.xml \
            -I $PLATFORM_JAR \
            -S res \
            -F cakru-unsigned.apk \
            --target-sdk-version 34 \
            --min-sdk-version 24

          # Memasukkan DEX dan Library ke APK
          zip -g cakru-unsigned.apk classes.dex
          mkdir -p lib/arm64-v8a
          # Ambil libhello.so hasil ndk-build
          cp libs/arm64-v8a/libhello.so lib/arm64-v8a/
          zip -r cakru-unsigned.apk lib/

      - name: Sign & Align APK
        run: |
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)

          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Cakru, O=Odfiz, C=ID"

          $BUILD_TOOLS_PATH/zipalign -f 4 cakru-unsigned.apk cakru-aligned.apk
          $BUILD_TOOLS_PATH/apksigner sign --ks debug.keystore \
            --ks-pass pass:android \
            --out cakru-final.apk cakru-aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cakru-Final-APK
          path: cakru-final.apk
